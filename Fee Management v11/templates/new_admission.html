{% extends "base.html" %}
{% block title %}New Admission{% endblock %}
{% block page_title %}<i class="fas fa-user-plus" style="color:#27ae60"></i> New Admission{% endblock %}
{% block content %}
<div style="max-width:640px;margin:0 auto;">
  <div class="card">
    <div class="card-header"><i class="fas fa-user-plus"></i><h3>Add New Student (NA)</h3></div>
    <div class="card-body">
      <div id="alert-box"></div>
      <div class="form-group"><label>Date of Admission</label><input type="date" class="form-control" id="date_of_admission"/></div>
      <div class="form-group"><label>Student Name <span class="req">*</span></label><input type="text" class="form-control" id="student_name" placeholder="Full name of student"/></div>
      <div class="grid-2">
        <div class="form-group"><label>Father Name <span class="req">*</span></label><input type="text" class="form-control" id="father_name" placeholder="Father's full name"/></div>
        <div class="form-group"><label>Mother Name <span class="req">*</span></label><input type="text" class="form-control" id="mother_name" placeholder="Mother's full name"/></div>
      </div>
      <div class="grid-2">
        <div class="form-group"><label>Father Contact</label><input type="tel" class="form-control" id="father_contact" placeholder="Phone number"/></div>
        <div class="form-group"><label>Mother Contact</label><input type="tel" class="form-control" id="mother_contact" placeholder="Phone number"/></div>
      </div>
      <div class="grid-2">
        <div class="form-group"><label>Grade / Class <span class="req">*</span></label><input type="text" class="form-control" id="grade" placeholder="e.g. 10, M1, M2"/></div>
        <div class="form-group"><label>Section</label>
          <select class="form-control" id="section">
            <option value="">— Select Section —</option>
            <option>A</option><option>B</option><option>C</option><option>D</option><option>E</option>
          </select>
        </div>
      </div>
      <!-- Fee fields MANDATORY -->
      <div style="background:#fef9e7;border:1px solid #f39c12;border-radius:6px;padding:12px;margin-bottom:12px;">
        <div style="font-size:12px;font-weight:700;color:#d35400;margin-bottom:8px;">
          <i class="fas fa-exclamation-triangle"></i> Fee details are MANDATORY before admission number is assigned
        </div>
        <div class="grid-2">
          <div class="form-group"><label>Gross Tuition Fee <span class="req">*</span></label><input type="number" class="form-control" id="gross_tuition" placeholder="Required" min="0" oninput="calcNet()"/></div>
          <div class="form-group"><label>Concession (if any)</label><input type="number" class="form-control" id="concession" placeholder="0" min="0" oninput="calcNet()"/></div>
        </div>
        <div class="grid-2">
          <div class="form-group"><label>Net Tuition Fee</label><input type="number" class="form-control" id="net_tuition" readonly style="font-weight:600;background:#eafaf1;"/></div>
          <div class="form-group"><label>MISC to be Paid <span class="req">*</span></label><input type="number" class="form-control" id="misc_to_pay" placeholder="Required" min="0"/></div>
        </div>
      </div>
      <!-- RTE Checkbox -->
      <div class="form-group" style="display:flex;align-items:center;gap:10px;">
        <input type="checkbox" id="is_rte" style="width:18px;height:18px;cursor:pointer;"/>
        <label for="is_rte" style="margin:0;cursor:pointer;font-weight:600;color:#8e44ad;">
          <i class="fas fa-star" style="color:#8e44ad;font-size:11px;"></i> RTE Student (Right to Education)
        </label>
      </div>
      <div class="form-group"><label>Admission Type</label><input type="text" class="form-control" value="NA (New Admission)" readonly style="background:#fef5e7;color:#d35400;font-weight:600;"/></div>
      <button class="btn btn-success btn-lg" id="save-btn" onclick="saveStudent()"><i class="fas fa-save"></i> Save New Admission</button>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
window.addEventListener('load',()=>{ setDateToday('date_of_admission'); });
function calcNet(){
  const g=parseFloat(document.getElementById('gross_tuition').value)||0;
  const c=parseFloat(document.getElementById('concession').value)||0;
  document.getElementById('net_tuition').value=Math.max(0,g-c);
}
async function saveStudent(){
  const alertBox=document.getElementById('alert-box'); alertBox.innerHTML='';
  const payload={
    admission_type:'NA',
    date_of_admission: getDateDisplay('date_of_admission'),
    student_name:   document.getElementById('student_name').value.trim(),
    father_name:    document.getElementById('father_name').value.trim(),
    mother_name:    document.getElementById('mother_name').value.trim(),
    father_contact: document.getElementById('father_contact').value.trim(),
    mother_contact: document.getElementById('mother_contact').value.trim(),
    grade:          document.getElementById('grade').value.trim(),
    section:        document.getElementById('section').value,
    gross_tuition:  parseFloat(document.getElementById('gross_tuition').value)||0,
    concession:     parseFloat(document.getElementById('concession').value)||0,
    net_tuition:    parseFloat(document.getElementById('net_tuition').value)||0,
    misc_to_pay:    parseFloat(document.getElementById('misc_to_pay').value)||0,
    is_rte:         document.getElementById('is_rte').checked ? 1 : 0,
  };
  // Client-side validation
  if(!payload.student_name) return showAlert(alertBox,'danger','Student Name is required.');
  if(!payload.father_name)  return showAlert(alertBox,'danger','Father Name is required.');
  if(!payload.mother_name)  return showAlert(alertBox,'danger','Mother Name is required.');
  if(!payload.grade)        return showAlert(alertBox,'danger','Grade is required.');
  if(!payload.gross_tuition) return showAlert(alertBox,'danger','Gross Tuition Fee is mandatory before admission number can be assigned.');
  if(!payload.misc_to_pay)   return showAlert(alertBox,'danger','MISC to be Paid is mandatory before admission number can be assigned.');

  const btn=document.getElementById('save-btn'); btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Saving...';
  try{
    const result=await apiPost('/api/students/add',payload);
    if(result.success){
      const rteTag = payload.is_rte ? ' ⭐ RTE' : '';
      showAlert(alertBox,'success',
        `✅ New Admission added!<br><b>Reference: ${result.ref_no}</b> | Student ID: <b>${result.student_uid||'—'}</b>${rteTag}`);
      ['student_name','father_name','mother_name','father_contact','mother_contact',
       'grade','gross_tuition','concession','net_tuition','misc_to_pay'].forEach(id=>document.getElementById(id).value='');
      document.getElementById('section').value='';
      document.getElementById('is_rte').checked=false;
      setDateToday('date_of_admission');
    } else {
      showAlert(alertBox,'danger','❌ '+result.error);
    }
  } catch(e){ showAlert(alertBox,'danger','Server error: '+e.message); }
  finally{ btn.disabled=false; btn.innerHTML='<i class="fas fa-save"></i> Save New Admission'; }
}
</script>
{% endblock %}
