{% extends "base.html" %}
{% block title %}All Receipts{% endblock %}
{% block page_title %}<i class="fas fa-file-pdf" style="color:#e74c3c"></i> All Receipts{% endblock %}
{% block content %}
<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;">

  <!-- Search -->
  <input type="text" id="search-r" placeholder="🔍 Receipt no or student..."
         class="form-control" style="width:240px;" oninput="filterReceipts()"/>

  <!-- Fee type -->
  <select id="filter-fee" class="form-control" style="width:130px;" onchange="filterReceipts()">
    <option value="">All Types</option>
    <option value="TUITION">Tuition</option>
    <option value="MISC">MISC</option>
  </select>

  <!-- Reference type: All / RA only / NA only -->
  <select id="filter-ref" class="form-control" style="width:130px;" onchange="filterReceipts()">
    <option value="">All Students</option>
    <option value="RA">RA Only</option>
    <option value="NA">NA Only</option>
  </select>

  <!-- Payment mode -->
  <select id="filter-mode" class="form-control" style="width:120px;" onchange="filterReceipts()">
    <option value="">All Modes</option>
    <option value="CASH">Cash</option>
    <option value="NEFT">NEFT</option>
  </select>

  <!-- Date from -->
  <div style="display:flex;align-items:center;gap:4px;">
    <label style="font-size:11px;color:var(--muted);white-space:nowrap;">From</label>
    <input type="date" id="filter-from" class="form-control" style="width:140px;" onchange="filterReceipts()"/>
  </div>

  <!-- Date to -->
  <div style="display:flex;align-items:center;gap:4px;">
    <label style="font-size:11px;color:var(--muted);white-space:nowrap;">To</label>
    <input type="date" id="filter-to" class="form-control" style="width:140px;" onchange="filterReceipts()"/>
  </div>

  <!-- Status -->
  <select id="filter-status" class="form-control" style="width:130px;" onchange="filterReceipts()">
    <option value="active">Active Only</option>
    <option value="">All (incl. cancelled)</option>
    <option value="cancelled">Cancelled</option>
  </select>

  <!-- Clear button -->
  <button class="btn btn-sm" style="background:#ecf0f1;color:var(--primary);border:1px solid var(--border);"
          onclick="clearFilters()">✕ Clear</button>

  <span id="r-count" style="font-size:12px;color:var(--muted);margin-left:4px;"></span>
</div>

<div class="card">
  <div class="card-header"><i class="fas fa-list"></i><h3>All Receipts</h3></div>
  <div class="card-body" style="padding:0;">
    <div class="table-wrapper" style="max-height:70vh;overflow-y:auto;">
      <table>
        <thead>
          <tr>
            <th>#</th><th>Receipt No.</th><th>Student</th><th>Ref No.</th>
            <th>Grade</th><th>Amount</th><th>Fee Type</th><th>Mode</th>
            <th>Date</th><th>Status</th><th>By</th><th>PDF</th>
          </tr>
        </thead>
        <tbody id="r-tbody"></tbody>
        <tfoot>
          <tr>
            <td colspan="5" style="text-align:right;font-weight:700;">TOTAL</td>
            <td id="r-total-amt" style="font-weight:700;"></td>
            <td colspan="6"></td>
          </tr>
        </tfoot>
      </table>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
let allReceipts = [];

window.addEventListener('load', async () => {
  allReceipts = await apiGet('/api/receipt/all');
  filterReceipts();
});

function clearFilters() {
  document.getElementById('search-r').value     = '';
  document.getElementById('filter-fee').value   = '';
  document.getElementById('filter-ref').value   = '';
  document.getElementById('filter-mode').value  = '';
  document.getElementById('filter-from').value  = '';
  document.getElementById('filter-to').value    = '';
  document.getElementById('filter-status').value = 'active';
  filterReceipts();
}

// Parse payment_date into YYYY-MM-DD for filter comparison
function toISO(r) {
  return displayToIso(r.payment_date || '') || (r.created_at || '').substring(0, 10);
}

function filterReceipts() {
  const q    = document.getElementById('search-r').value.toLowerCase().trim();
  const ft   = document.getElementById('filter-fee').value;
  const ref  = document.getElementById('filter-ref').value;       // RA / NA / ''
  const mode = document.getElementById('filter-mode').value;
  const from = document.getElementById('filter-from').value;      // YYYY-MM-DD
  const to   = document.getElementById('filter-to').value;
  const st   = document.getElementById('filter-status').value;

  const filtered = allReceipts.filter(r => {
    const rDate = toISO(r);
    const refNo = (r.reference_no || '').toUpperCase();

    if (q && !(r.receipt_no||'').toLowerCase().includes(q) &&
              !(r.student_name||'').toLowerCase().includes(q) &&
              !(r.reference_no||'').toLowerCase().includes(q)) return false;
    if (ft   && (r.fee_type||'').toUpperCase() !== ft)           return false;
    if (ref  && !refNo.startsWith(ref))                          return false;
    if (mode && (r.payment_mode||'').toUpperCase() !== mode)     return false;
    if (from && rDate < from)                                    return false;
    if (to   && rDate > to)                                      return false;
    if (st   && (r.status||'active') !== st)                     return false;
    return true;
  });

  const tbody = document.getElementById('r-tbody');
  let total = 0;

  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="12" style="text-align:center;padding:24px;color:var(--muted);">No receipts found</td></tr>';
  } else {
    tbody.innerHTML = filtered.map((r, i) => {
      total += r.amount || 0;
      const cancelled = r.status === 'cancelled';
      return `<tr style="${cancelled ? 'opacity:.55;text-decoration:line-through;' : ''}">
        <td style="color:var(--muted)">${i + 1}</td>
        <td style="font-family:monospace;font-size:11px;font-weight:600;">
          <span class="tag ${r.fee_type === 'TUITION' ? 'tag-tuition' : 'tag-misc'}">${r.receipt_no}</span>
        </td>
        <td style="font-weight:600;font-size:12px;max-width:120px;">${r.student_name || '—'}</td>
        <td style="font-family:monospace;font-size:11px;">${r.reference_no || '—'}</td>
        <td>${r.grade || '—'}</td>
        <td style="font-weight:600;text-align:right;">${formatRs(r.amount)}</td>
        <td><span class="tag ${r.fee_type === 'TUITION' ? 'tag-tuition' : 'tag-misc'}">${r.fee_type || '—'}</span></td>
        <td><span class="tag ${(r.payment_mode || '') === 'CASH' ? 'tag-cash' : 'tag-neft'}">${r.payment_mode || '—'}</span></td>
        <td style="font-size:11px;white-space:nowrap;">${isoToDisplay(r.payment_date) || isoToDisplay((r.created_at||'').substring(0,10)) || ''}</td>
        <td><span class="tag ${r.status === 'active' ? 'tag-active' : 'tag-cancelled'}">${r.status || 'active'}</span></td>
        <td style="font-size:11px;color:var(--muted);">${r.created_by || ''}</td>
        <td>${r.pdf_path && !cancelled
          ? `<a href="/api/receipt/download/${encodeURIComponent(r.receipt_no)}" class="btn btn-sm btn-primary"><i class="fas fa-download"></i></a>`
          : '—'}</td>
      </tr>`;
    }).join('');
  }

  document.getElementById('r-total-amt').textContent = formatRs(total);
  document.getElementById('r-count').textContent = filtered.length + ' of ' + allReceipts.length + ' receipts';
}
</script>
{% endblock %}
